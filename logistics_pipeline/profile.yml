logistics_pipeline:
  outputs:

    # Local development (outside Docker) 
    dev:
      type: duckdb
      path: /mnt/c/Users/MY LAPTOP/Logistics_Data_Pipeline/src/warehouse/data/warehouse.duckdb
      extensions:
        - httpfs
      settings:
        s3_endpoint: localhost:9000
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
        s3_use_ssl: false
        s3_url_style: path

    # Docker environment
    docker:
      type: duckdb
      path: /opt/airflow/warehouse/data/warehouse.duckdb
      extensions:
        - httpfs
      settings:
        s3_endpoint: minio:9000        # service name, not localhost
        s3_access_key_id: minioadmin
        s3_secret_access_key: minioadmin
        s3_use_ssl: false
        s3_url_style: path

  target: dev  # default to local; Docker overrides this via --target flag